<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        .container { font-family: Arial, sans-serif; padding: 20px; border: 1px solid #eee; }
        .header { background-color: #ff4757; color: white; padding: 10px; text-align: center; }
        .content { margin-top: 20px; line-height: 1.6; }
        .otp { font-size: 24px; font-weight: bold; color: #ff4757; letter-spacing: 5px; }
        .footer { margin-top: 30px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>FOOD DELIVERY HKT</h2>
    </div>
    <div class="content">
        <p>Chào <span th:text="${name}">User</span>,</p>
        <p>Cảm ơn bạn đã sử dụng dịch vụ của chúng tôi. Đây là mã xác thực của bạn:</p>
        <p class="otp" th:text="${otpCode}">123456</p>
        <p>Mã này sẽ hết hạn trong 15 phút.</p>
    </div>
    <div class="footer">
        <p>© 2026 HKT Food Delivery Team. All rights reserved.</p>
    </div>
</div>
</body>
</html>
