spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/food_delivery_db?prepareThreshold=0
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false