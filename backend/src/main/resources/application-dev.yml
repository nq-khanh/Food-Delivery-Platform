spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/food_delivery_db?prepareThreshold=0
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  frontend:
    urls:
      user: https://food-user.hkt.com
      merchant: https://food-merchant.hkt.com
      shipper: https://food-shipper.hkt.com

  embedding:
    api-url: ${EMBEDDING_API_URL:http://localhost:8000}
  jwt:
    secret: ${JWT_SECRET:w6WURf8RWmaS3Ned1m8YHtwDI1PWc9kO0D06ewpOv8c=}
    access-token-expiration-ms: 900000        # 15 phút
    refresh-token-expiration-ms: 604800000    # 7 ngày
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:food-delivery-bucket}
  default-expiry: 60
  max-file-size-bytes: 52428800
  allowed-content-types:
    - image/png
    - image/jpeg
    - image/gif
    - image/webp
    - application/pdf
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    - text/plain
    - text/csv

logging:
  level:
    org.springframework.security: DEBUG
    com.hkt.fooddelivery: DEBUG