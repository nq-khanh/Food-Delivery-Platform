services:
  postgres:
    build: .  # Chỉ định Docker build từ file Dockerfile trong cùng thư mục
    container_name: food_postgres
    environment:
      POSTGRES_DB: food_delivery_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - food_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: food_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@food.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - food_network

  minio:
    image: minio/minio
    container_name: food_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - food_network


  embedding-api:
    image: ngthanhtung/vn-embedding-api:v1
    container_name: food_embedding
    ports:
      - "8000:8000"
    restart: always
    networks:
      - food_network
    deploy:
      resources:
        limits:
          memory: 4G
networks:
  food_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: